; PlatformIO Project Configuration File for standalone Cardulator repository

[platformio]
default_envs = cardputer
src_dir = src

[env:cardputer]
platform = espressif32
board = m5stack-stamps3
framework = arduino
monitor_speed = 115200
build_unflags = -std=gnu++11 -std=gnu++14 -std=gnu++17 -std=c++11 -std=c++14 -std=c++17 -fno-rtti
build_flags = 
	-std=gnu++2a
	-Wno-attributes
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DMXPARSER_BUILD_PROJECT_VERSION_MAJOR=6
	-DMXPARSER_BUILD_PROJECT_VERSION_MINOR=1
	-DMXPARSER_BUILD_PROJECT_VERSION_PATCH=0
	-DMXPARSER_BUILD_PROJECT_VERSION=\"6.1.0\"
	-DMXPARSER_BUILD_CMAKE_SYSTEM_NAME=\"\"
	-DMXPARSER_BUILD_CMAKE_SYSTEM_VERSION=\"\"
	-DMXPARSER_BUILD_CMAKE_SYSTEM_PROCESSOR=\"\"
	-DMXPARSER_BUILD_CMAKE_SYSTEM=\"\"
	-DMXPARSER_BUILD_CMAKE_CXX_COMPILER_ID=\"\"
	-DMXPARSER_BUILD_CMAKE_CXX_COMPILER_VERSION=\"\"
	-DMXPARSER_BUILD_CMAKE_CXX_COMPILER=\"\"
	-DMXPARSER_BUILD_CMAKE_CXX_COMPILER_FRONTEND_VARIANT=\"\"
	-DMXPARSER_BUILD_CMAKE_CXX_COMPILER_LINKER_FRONTEND_VARIANT=\"\"
	-DMXPARSER_BUILD_CMAKE_CXX_COMPILER_LINKER_ID=\"\"
	-DMXPARSER_BUILD_CMAKE_CXX_COMPILER_LINKER_VERSION=\"\"
	-DMXPARSER_BUILD_CMAKE_CXX_COMPILER_LINKER=\"\"
	-DMXPARSER_BUILD_CMAKE_MSVC=\"0\"
	-DMXPARSER_BUILD_CMAKE_BUILD_TYPE=\"\"
	-DMXPARSER_BUILD_CMAKE_GENERATOR=\"\"
	-DMXPARSER_BUILD_CMAKE_VERSION=\"\"
	-DMXPARSER_BUILD_CMAKE_MAKE_PROGRAM=\"\"
	-DMXPARSER_BUILD_CMAKE_SIZEOF_VOID_P=\"8\"
	-DMXPARSER_BUILD_CMAKE_HOST_SYSTEM_NAME=\"\"
	-DMXPARSER_BUILD_CMAKE_ENV_SPECIFIC_CONFIG=\"\"
	-DMXPARSER_BUILD_CMAKE_CXX_FLAGS_RELEASE=\"\"
platform_packages = 
	framework-arduinoespressif32 @ https://github.com/espressif/arduino-esp32.git#2.0.17
	toolchain-xtensa-esp32s3 @ 12.2.0+20230208
lib_extra_dirs = 
	lib
extra_scripts = pre:build_tinyexpr.py

[env:native]
platform = native
build_unflags = -std=gnu++11
build_flags = 
	-std=gnu++2a
	-O0
	-DUNITY_INCLUDE_DOUBLE
	-DMXPARSER_BUILD_PROJECT_VERSION_MAJOR=6
	-DMXPARSER_BUILD_PROJECT_VERSION_MINOR=1
	-DMXPARSER_BUILD_PROJECT_VERSION_PATCH=0
	-DMXPARSER_BUILD_PROJECT_VERSION=\"6.1.0\"
	-DMXPARSER_BUILD_CMAKE_SYSTEM_NAME=\"\"
	-DMXPARSER_BUILD_CMAKE_SYSTEM_VERSION=\"\"
	-DMXPARSER_BUILD_CMAKE_SYSTEM_PROCESSOR=\"\"
	-DMXPARSER_BUILD_CMAKE_SYSTEM=\"\"
	-DMXPARSER_BUILD_CMAKE_CXX_COMPILER_ID=\"\"
	-DMXPARSER_BUILD_CMAKE_CXX_COMPILER_VERSION=\"\"
	-DMXPARSER_BUILD_CMAKE_CXX_COMPILER=\"\"
	-DMXPARSER_BUILD_CMAKE_CXX_COMPILER_FRONTEND_VARIANT=\"\"
	-DMXPARSER_BUILD_CMAKE_CXX_COMPILER_LINKER_FRONTEND_VARIANT=\"\"
	-DMXPARSER_BUILD_CMAKE_CXX_COMPILER_LINKER_ID=\"\"
	-DMXPARSER_BUILD_CMAKE_CXX_COMPILER_LINKER_VERSION=\"\"
	-DMXPARSER_BUILD_CMAKE_CXX_COMPILER_LINKER=\"\"
	-DMXPARSER_BUILD_CMAKE_MSVC=\"0\"
	-DMXPARSER_BUILD_CMAKE_BUILD_TYPE=\"\"
	-DMXPARSER_BUILD_CMAKE_GENERATOR=\"\"
	-DMXPARSER_BUILD_CMAKE_VERSION=\"\"
	-DMXPARSER_BUILD_CMAKE_MAKE_PROGRAM=\"\"
	-DMXPARSER_BUILD_CMAKE_SIZEOF_VOID_P=\"8\"
	-DMXPARSER_BUILD_CMAKE_HOST_SYSTEM_NAME=\"\"
	-DMXPARSER_BUILD_CMAKE_ENV_SPECIFIC_CONFIG=\"\"
	-DMXPARSER_BUILD_CMAKE_CXX_FLAGS_RELEASE=\"\"
lib_extra_dirs = 
	lib
extra_scripts = pre:build_tinyexpr.py

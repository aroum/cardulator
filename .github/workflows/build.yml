name: Build Cardulator

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest


    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        submodules: recursive

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install platformio

    - name: Run Native Host Tests
      run: |
        pio test -e native

    - name: Build Cardulator Firmware
      run: |
        pio run -e cardputer

    - name: Prepare Binary Artifact
      id: prep
      run: |
        VERSION=$(git describe --tags --always || echo "v1.0.0")
        BIN_NAME="cardulator-${VERSION}.bin"
        
        # Locate generated firmware binary (cardulator.bin or firmware.bin)
        FW_PATH=$(find .pio/build/ -name "*.bin" ! -name "partitions.bin" | head -n 1)
        if [ -z "$FW_PATH" ]; then
          echo "Error: binary artifact not found!"
          ls -R .pio/
          exit 1
        fi
        
        echo "Found firmware binary at: $FW_PATH"
        cp "$FW_PATH" "${BIN_NAME}"
        cp "$FW_PATH" "cardulator.bin"
        echo "bin_name=${BIN_NAME}" >> $GITHUB_OUTPUT
        echo "version=${VERSION}" >> $GITHUB_OUTPUT

    - name: Upload firmware artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.prep.outputs.bin_name }}
        path: |
          ${{ steps.prep.outputs.bin_name }}
          cardulator.bin




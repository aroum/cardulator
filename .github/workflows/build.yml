name: Build Cardulator

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        submodules: recursive

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install platformio

    - name: Run Native Host Tests
      run: |
        pio test -e native

    - name: Build Cardulator Firmware
      run: |
        pio run -e cardputer

    - name: Prepare Binary Artifact
      id: prep
      run: |
        VERSION=$(git describe --tags --always || echo "v1.0.0")
        BIN_NAME="cardulator-${VERSION}.bin"
        cp .pio/build/cardputer/firmware.bin "${BIN_NAME}"
        cp .pio/build/cardputer/firmware.bin "cardulator.bin"
        echo "bin_name=${BIN_NAME}" >> $GITHUB_OUTPUT
        echo "version=${VERSION}" >> $GITHUB_OUTPUT

    - name: Upload firmware artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.prep.outputs.bin_name }}
        path: |
          ${{ steps.prep.outputs.bin_name }}
          cardulator.bin

